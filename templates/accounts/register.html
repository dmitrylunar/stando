{% extends "base.html" %}

{% block content %}
        <div class="text-center row justify-content-center mt-5">
            <div class="col-md-4">
                {% if form.errors %}                                                                                
                    <div class="text-danger">
                        {% for field in form %}
                            {% for error in field.errors %}
                                <div class="text-danger mb-1">{{ error }}</div>
                            {% endfor %}
                        {% endfor %}
                    </div>                                                                                          
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for='id_username'>Придумайте имя пользователя</label>
                        <input type="text" name="username" id="id_username" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="id_password">Придумайте пароль</label>
                        <input type="password" name="password1" id="id_password" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="id_password2">Подтвердите пароль</label>
                        <input type="password" name="password2" id="id_password2" class="form-control">
                    </div>
                    <button class="btn btn-primary">Подтвердить</button>
                </form>
            </div>
        </div>
{% endblock %}
